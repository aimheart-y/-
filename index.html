<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>相続税計算（最高額と最低額）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #2b6cb0, #2c5282);
      color: white;
      padding: 24px 20px;
      text-align: center;
      position: relative;
    }

    header .logo {
      position: absolute;
      top: 12px;
      right: 16px;
      height: 26px;
      width: auto;
      object-fit: contain;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    header p {
      font-size: 0.85rem;
      opacity: 0.85;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 24px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #2b6cb0;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 2px solid #ebf4ff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card h2 .step {
      background: #2b6cb0;
      color: white;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    /* パターン選択 */
    .pattern-group-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #718096;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      margin-top: 14px;
    }

    .pattern-group-label:first-child { margin-top: 0; }

    .pattern-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .pattern-btn {
      border: 2px solid #cbd5e0;
      border-radius: 10px;
      padding: 16px 10px;
      text-align: center;
      cursor: pointer;
      background: white;
      transition: all 0.2s;
      font-family: inherit;
    }

    .pattern-btn:hover {
      border-color: #4299e1;
      background: #ebf8ff;
    }

    .pattern-btn.active {
      border-color: #2b6cb0;
      background: #ebf4ff;
    }

    .pattern-btn .icon {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .pattern-btn .label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #4a5568;
      line-height: 1.4;
    }

    .pattern-btn.active .label {
      color: #2b6cb0;
    }

    /* 相続人数入力 */
    .heir-count-area {
      display: none;
      margin-top: 18px;
      padding: 16px;
      background: #f7fafc;
      border-radius: 8px;
    }

    .heir-count-area.visible {
      display: block;
    }

    .form-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .form-row label {
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .number-input {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .number-input button {
      width: 32px;
      height: 32px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      background: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #4a5568;
      transition: background 0.15s;
    }

    .number-input button:hover {
      background: #e2e8f0;
    }

    .number-input span {
      font-size: 1.1rem;
      font-weight: 700;
      min-width: 28px;
      text-align: center;
      color: #2b6cb0;
    }

    /* 金額入力 */
    .amount-grid {
      display: grid;
      gap: 16px;
    }

    .amount-item label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
    }

    .amount-item .hint {
      font-size: 0.75rem;
      color: #718096;
      margin-bottom: 6px;
      font-weight: 400;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap input {
      width: 100%;
      padding: 10px 52px 10px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }

    .input-wrap input:focus {
      border-color: #4299e1;
      box-shadow: 0 0 0 3px rgba(66,153,225,0.2);
    }

    .input-wrap .unit {
      position: absolute;
      right: 12px;
      font-size: 0.85rem;
      color: #718096;
      pointer-events: none;
    }

    .calc-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2b6cb0, #2c5282);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      font-family: inherit;
      margin-top: 4px;
    }

    .calc-btn:hover { opacity: 0.9; }
    .calc-btn:active { transform: scale(0.99); }

    /* 結果エリア */
    #result-area { display: none; }

    .result-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .summary-box {
      background: #f7fafc;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .summary-box.highlight {
      background: #ebf4ff;
      border: 2px solid #bee3f8;
    }

    .summary-box .label {
      font-size: 0.78rem;
      color: #718096;
      margin-bottom: 6px;
    }

    .summary-box .value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #2d3748;
    }

    .summary-box.highlight .value {
      color: #2b6cb0;
      font-size: 1.4rem;
    }

    .summary-box .sub {
      font-size: 0.75rem;
      color: #a0aec0;
      margin-top: 4px;
    }

    /* 結果ボックス */
    .tax-boxes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 4px;
    }

    .tax-box {
      border-radius: 10px;
      padding: 18px 14px;
      text-align: center;
    }

    .tax-box.max {
      background: #fff5f5;
      border: 2px solid #feb2b2;
    }

    .tax-box.min {
      background: #f0fff4;
      border: 2px solid #9ae6b4;
    }

    .tax-box.single {
      background: #ebf4ff;
      border: 2px solid #bee3f8;
      grid-column: 1 / -1;
    }

    .tax-box .box-label {
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .tax-box.max .box-label { color: #c53030; }
    .tax-box.min .box-label { color: #276749; }
    .tax-box.single .box-label { color: #2b6cb0; }

    .tax-box .box-sub {
      font-size: 0.72rem;
      margin-bottom: 8px;
    }

    .tax-box.max .box-sub { color: #fc8181; }
    .tax-box.min .box-sub { color: #68d391; }
    .tax-box.single .box-sub { color: #63b3ed; }

    .tax-box .box-value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .tax-box.max .box-value { color: #c53030; }
    .tax-box.min .box-value { color: #276749; }
    .tax-box.single .box-value { color: #2b6cb0; }

    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 16px 0;
    }

    .calc-detail {
      font-size: 0.82rem;
      color: #4a5568;
      background: #f7fafc;
      border-radius: 8px;
      padding: 14px;
      line-height: 1.8;
    }

    .calc-detail .row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
    }

    .calc-detail .row.strong {
      font-weight: 700;
      color: #2d3748;
      border-top: 1px solid #e2e8f0;
      padding-top: 8px;
      margin-top: 4px;
    }

    /* 贈与比較 */
    .gift-table { display: grid; grid-template-columns: 5.5em 1fr 1fr 1fr; border-radius: 10px; overflow: hidden; border: 1px solid #e2e8f0; }
    .gift-table .gt-corner { background: #ebf4ff; padding: 10px 8px; border-bottom: 2px solid #e2e8f0; }
    .gift-table .gt-header { padding: 10px 8px; font-size: 0.76rem; font-weight: 700; text-align: center; border-bottom: 2px solid #e2e8f0; line-height: 1.5; }
    .gift-table .gt-header.no-gift { background: #fffaf0; color: #c05621; }
    .gift-table .gt-header.general { background: #f7fafc; color: #718096; }
    .gift-table .gt-header.special { background: #f0fff4; color: #276749; }
    .gift-table .gt-label { background: #ebf4ff; padding: 8px 10px; font-size: 0.76rem; font-weight: 600; color: #4a5568; display: flex; align-items: center; border-top: 1px solid #e2e8f0; }
    .gift-table .gt-cell { padding: 8px 10px; font-size: 0.82rem; text-align: right; border-top: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: flex-end; }
    .gift-table .gt-cell.no-gift { background: #fffaf0; color: #2d3748; }
    .gift-table .gt-cell.general { background: #f7fafc; }
    .gift-table .gt-cell.special { background: #f0fff4; }
    .gift-table .gt-label.total { font-weight: 700; border-top: 2px solid #cbd5e0; }
    .gift-table .gt-cell.total { font-weight: 700; border-top: 2px solid #cbd5e0; font-size: 0.9rem; }
    .gift-table .gt-cell.total.no-gift { color: #c05621; }
    .gift-table .gt-cell.total.general { color: #2d3748; }
    .gift-table .gt-cell.total.special { color: #276749; }
    .gift-table .gt-label.diff { border-top: 1px solid #e2e8f0; }
    .gift-table .gt-cell.diff { border-top: 1px solid #e2e8f0; justify-content: center; }
    .diff-badge { font-size: 0.73rem; padding: 3px 8px; border-radius: 20px; font-weight: 700; text-align: center; display: inline-block; }
    .diff-badge.saving { background: #c6f6d5; color: #276749; }
    .diff-badge.loss   { background: #fed7d7; color: #c53030; }
    .diff-badge.even   { background: #e2e8f0; color: #718096; }

    @media (max-width: 480px) {
      .pattern-grid { grid-template-columns: 1fr; }
      .result-summary { grid-template-columns: 1fr; }
      .gift-table { grid-template-columns: 4.5em 1fr 1fr 1fr; font-size: 0.85; }
      .gift-table .gt-header { font-size: 0.65rem; padding: 8px 4px; }
      .gift-table .gt-label { font-size: 0.65rem; padding: 6px 4px; }
      .gift-table .gt-cell { font-size: 0.68rem; padding: 6px 4px; }
      header h1 { font-size: 1.3rem; }
    }
  </style>

  <h1>相続税計算（最高額と最低額）</h1>
</header>

<div class="container">

  <!-- STEP 1: パターン選択 -->
  <div class="card">
    <h2><span class="step">1</span>相続人のパターンを選択</h2>

    <div class="pattern-group-label">配偶者あり</div>
    <div class="pattern-grid">
      <button class="pattern-btn" data-pattern="A" onclick="selectPattern('A')">
        <div class="icon">👩👶</div>
        <div class="label">配偶者と子</div>
      </button>
      <button class="pattern-btn" data-pattern="B" onclick="selectPattern('B')">
        <div class="icon">👩👴</div>
        <div class="label">配偶者と親</div>
      </button>
      <button class="pattern-btn" data-pattern="C" onclick="selectPattern('C')">
        <div class="icon">👩👬</div>
        <div class="label">配偶者と<br>兄弟姉妹</div>
      </button>
    </div>

    <div class="pattern-group-label" style="margin-top:18px;">配偶者なし</div>
    <div class="pattern-grid">
      <button class="pattern-btn" data-pattern="D" onclick="selectPattern('D')">
        <div class="icon">👶</div>
        <div class="label">子のみ</div>
      </button>
      <button class="pattern-btn" data-pattern="E" onclick="selectPattern('E')">
        <div class="icon">👴</div>
        <div class="label">親のみ</div>
      </button>
      <button class="pattern-btn" data-pattern="F" onclick="selectPattern('F')">
        <div class="icon">👬</div>
        <div class="label">兄弟姉妹のみ</div>
      </button>
    </div>

    <div class="heir-count-area" id="heir-count-area">
      <div class="form-row">
        <label id="heir-label">人数：</label>
        <div class="number-input">
          <button onclick="changeCount(-1)">－</button>
          <span id="heir-count-display">1</span>
          <button onclick="changeCount(1)">＋</button>
        </div>
        <span style="font-size:0.85rem; color:#718096;">人</span>
        <span id="spouse-only-note" style="display:none; font-size:0.82rem; color:#2b6cb0; font-weight:700; background:#ebf4ff; padding:3px 10px; border-radius:20px;">配偶者のみ</span>
      </div>
    </div>
  </div>

  <!-- STEP 2: 財産総額入力 -->
  <div class="card">
    <h2><span class="step">2</span>財産総額を入力 <span style="font-size:0.72rem; font-weight:400; color:#718096; margin-left:auto;">（Enterキーでも実行可）</span></h2>
    <div class="amount-grid">
      <div class="amount-item">
        <label>正味の財産総額</label>
        <div class="hint">預貯金・不動産・有価証券・債務など、すべての財産の合計額を入力してください</div>
        <div class="input-wrap">
          <input type="number" id="total-assets" placeholder="例：50000" min="0" step="100" onkeydown="if(event.key==='Enter') calculate()">
          <span class="unit">万円</span>
        </div>
      </div>
    </div>
  </div>

  <!-- STEP 3: 贈与額入力（任意） -->
  <div class="card">
    <h2><span class="step">3</span>もし贈与するなら <span style="font-size:0.72rem; font-weight:400; color:#718096; margin-left:auto;">（入力は任意・Enterキーでも実行可）</span></h2>
    <div class="amount-grid">
      <div class="amount-item">
        <label>贈与を検討している金額（年間）</label>
        <div class="hint">入力した場合、②財産総額からその分を差し引いて相続税を計算し、贈与税との合計を比較します。</div>
        <div class="input-wrap">
          <input type="number" id="gift-amount" placeholder="例：3000（任意）" min="0" step="100" onkeydown="if(event.key==='Enter') calculate()">
          <span class="unit">万円</span>
        </div>
      </div>
    </div>
  </div>

  <!-- STEP 4: 計算ボタン -->
  <div class="card">
    <h2><span class="step">4</span>試算実行</h2>
    <button class="calc-btn" onclick="calculate()">相続税を試算する</button>
  </div>

  <!-- 結果 -->
  <div id="result-area">
    <div class="card">
      <h2>計算結果</h2>
      <div id="result-summary"></div>
      <div class="divider"></div>
      <div style="margin-bottom:12px; font-size:0.9rem; font-weight:700; color:#4a5568;">計算の内訳</div>
      <div class="calc-detail" id="calc-detail"></div>
    </div>
    <div class="card" id="gift-compare-card" style="display:none;">
      <h2>贈与シミュレーション比較</h2>
      <div id="gift-compare-content"></div>
    </div>
  </div>

</div>

<script>
  // ---- 状態管理 ----
  let selectedPattern = null;
  let heirCount = 1;

  // パターン設定（hasSpouse: 配偶者の有無）
  const PATTERNS = {
    A: { label: '配偶者と子',       heirLabel: '子の人数',           minCount: 0, maxCount: 10, hasSpouse: true  },
    B: { label: '配偶者と親',       heirLabel: '親の人数（存命）',   minCount: 0, maxCount: 2,  hasSpouse: true  },
    C: { label: '配偶者と兄弟姉妹', heirLabel: '兄弟姉妹の人数',    minCount: 0, maxCount: 10, hasSpouse: true  },
    D: { label: '子のみ',           heirLabel: '子の人数',           minCount: 1, maxCount: 10, hasSpouse: false },
    E: { label: '親のみ',           heirLabel: '親の人数（存命）',   minCount: 1, maxCount: 2,  hasSpouse: false },
    F: { label: '兄弟姉妹のみ',     heirLabel: '兄弟姉妹の人数',    minCount: 1, maxCount: 10, hasSpouse: false },
  };

  // 配偶者ありパターンの法定相続分（配偶者の取り分）
  const SPOUSE_SHARE = { A: 1/2, B: 2/3, C: 3/4 };

  // 相続人の種別ラベル
  const HEIR_LABEL = { A: '子', B: '親', C: '兄弟姉妹', D: '子', E: '親', F: '兄弟姉妹' };

  // 相続税速算表（課税遺産総額（万円）, 税率, 控除額（万円））
  const TAX_TABLE = [
    [1000,     0.10,    0],
    [3000,     0.15,   50],
    [5000,     0.20,  200],
    [10000,    0.30,  700],
    [20000,    0.40, 1700],
    [30000,    0.45, 2700],
    [60000,    0.50, 4200],
    [Infinity, 0.55, 7200],
  ];

  // 贈与税速算表（一般税率）
  const GIFT_TAX_GENERAL = [
    [200,      0.10,   0],
    [300,      0.15,  10],
    [400,      0.20,  25],
    [600,      0.30,  65],
    [1000,     0.40, 125],
    [1500,     0.45, 175],
    [3000,     0.50, 250],
    [Infinity, 0.55, 400],
  ];

  // 贈与税速算表（特例税率：直系卑属18歳以上への贈与）
  const GIFT_TAX_SPECIAL = [
    [200,      0.10,   0],
    [400,      0.15,  10],
    [600,      0.20,  30],
    [1000,     0.30,  90],
    [1500,     0.40, 190],
    [3000,     0.45, 265],
    [4500,     0.50, 415],
    [Infinity, 0.55, 640],
  ];

  function calcGiftTax(amount, table) {
    const taxable = Math.max(0, amount - 110);
    if (taxable <= 0) return 0;
    for (const [limit, rate, deduction] of table) {
      if (taxable <= limit) return Math.round(Math.max(0, taxable * rate - deduction));
    }
    return 0;
  }

  function computeInheritanceTax(netAssets) {
    const { hasSpouse } = PATTERNS[selectedPattern];
    const totalHeirs = hasSpouse ? 1 + heirCount : heirCount;
    const basicDeduction = 3000 + 600 * totalHeirs;
    const taxableAssets = Math.max(0, netAssets - basicDeduction);
    if (taxableAssets === 0) return { min: 0, max: 0 };
    if (hasSpouse) {
      const legalSpouseShare = heirCount === 0 ? 1 : SPOUSE_SHARE[selectedPattern];
      const surcharge = selectedPattern === 'C' ? 1.2 : 1.0;
      let maxTax;
      if (heirCount === 0) {
        maxTax = Math.round(calcTax(taxableAssets));
      } else {
        maxTax = Math.round(calcTax(taxableAssets / heirCount) * surcharge * heirCount);
      }
      let minTax;
      if (heirCount === 0) {
        minTax = 0;
      } else {
        const reliefLimit = Math.max(netAssets * legalSpouseShare, 16000);
        minTax = netAssets <= reliefLimit ? 0 : Math.round(calcTax(taxableAssets) * (netAssets - reliefLimit) / netAssets);
      }
      return { min: minTax, max: maxTax };
    } else {
      const surcharge = selectedPattern === 'F' ? 1.2 : 1.0;
      const total = Math.round(calcTax(taxableAssets / heirCount) * surcharge) * heirCount;
      return { min: total, max: total };
    }
  }

  function calcTax(amount) {
    for (const [limit, rate, deduction] of TAX_TABLE) {
      if (amount <= limit) return Math.max(0, amount * rate - deduction);
    }
    return 0;
  }

  // ---- UI操作 ----
  function selectPattern(p) {
    selectedPattern = p;
    heirCount = PATTERNS[p].minCount === 0 ? 1 : 1; // 配偶者ありパターンは1スタート（0に減らすことも可）
    document.querySelectorAll('.pattern-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`[data-pattern="${p}"]`).classList.add('active');

    const area = document.getElementById('heir-count-area');
    area.classList.add('visible');
    document.getElementById('heir-label').textContent = PATTERNS[p].heirLabel + '：';
    document.getElementById('heir-count-display').textContent = heirCount;
    const note = document.getElementById('spouse-only-note');
    if (note) note.style.display = 'none';
  }

  function changeCount(delta) {
    if (!selectedPattern) return;
    const { minCount, maxCount } = PATTERNS[selectedPattern];
    heirCount = Math.min(maxCount, Math.max(minCount, heirCount + delta));
    document.getElementById('heir-count-display').textContent = heirCount;
    const note = document.getElementById('spouse-only-note');
    if (note) note.style.display = (heirCount === 0) ? 'inline' : 'none';
  }

  // ---- 計算ロジック ----
  function calculate() {
    if (!selectedPattern) {
      alert('相続人のパターンを選択してください。');
      return;
    }

    const netAssets = parseFloat(document.getElementById('total-assets').value) || 0;

    if (netAssets <= 0) {
      alert('財産総額を入力してください。');
      return;
    }

    const { hasSpouse } = PATTERNS[selectedPattern];
    const totalHeirs = hasSpouse ? 1 + heirCount : heirCount;
    const basicDeduction = 3000 + 600 * totalHeirs;
    const taxableAssets = Math.max(0, netAssets - basicDeduction);

    if (taxableAssets === 0) {
      showZeroResult(netAssets, basicDeduction, totalHeirs);
      renderGiftCompare(netAssets);
      return;
    }

    if (hasSpouse) {
      calcWithSpouse(netAssets, basicDeduction, taxableAssets, totalHeirs);
    } else {
      calcNoSpouse(netAssets, basicDeduction, taxableAssets, totalHeirs);
    }
    renderGiftCompare(netAssets);
  }

  function calcWithSpouse(netAssets, basicDeduction, taxableAssets, totalHeirs) {
    const legalSpouseShare = heirCount === 0 ? 1 : SPOUSE_SHARE[selectedPattern];
    const eachOtherShare   = heirCount > 0 ? (1 - legalSpouseShare) / heirCount : 0;
    const surcharge        = selectedPattern === 'C' ? 1.2 : 1.0;

    // 最高額：配偶者のみ→配偶者が全額取得・軽減なし／配偶者以外あり→配偶者以外が全額取得・軽減なし
    let maxTax;
    if (heirCount === 0) {
      maxTax = Math.round(calcTax(taxableAssets));
    } else {
      const eachBase = taxableAssets / heirCount;
      maxTax = Math.round(calcTax(eachBase) * surcharge * heirCount);
    }

    // 最低額：配偶者のみ→軽減適用で0／配偶者以外あり→配偶者が全額取得・軽減を最大限適用
    let minTax;
    if (heirCount === 0) {
      // 配偶者が全額取得、軽減限度=max(netAssets,16000)≥netAssets → 常に0
      minTax = 0;
    } else {
      const taxIfSpouseAll = calcTax(taxableAssets);
      // 軽減限度額 = max(法定相続分相当額, 1億6千万)
      const reliefLimit  = Math.max(netAssets * legalSpouseShare, 16000);
      if (netAssets <= reliefLimit) {
        minTax = 0;
      } else {
        minTax = Math.round(taxIfSpouseAll * (netAssets - reliefLimit) / netAssets);
      }
    }

    renderResult({
      hasSpouse: true,
      pattern: selectedPattern,
      netAssets, basicDeduction, taxableAssets, totalHeirs, heirCount,
      legalSpouseShare, eachOtherShare, surcharge,
      maxTax, minTax,
    });
  }

  function calcNoSpouse(netAssets, basicDeduction, taxableAssets, totalHeirs) {
    const surcharge = selectedPattern === 'F' ? 1.2 : 1.0;
    const eachShare = 1 / heirCount;
    const eachTax   = Math.round(calcTax(taxableAssets * eachShare) * surcharge);
    const totalTax  = eachTax * heirCount;

    renderResult({
      hasSpouse: false,
      pattern: selectedPattern,
      netAssets, basicDeduction, taxableAssets, totalHeirs, heirCount,
      eachShare, surcharge, totalTax, eachTax,
    });
  }

  function showZeroResult(netAssets, basicDeduction, totalHeirs) {
    document.getElementById('result-area').style.display = 'block';
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });

    document.getElementById('result-summary').innerHTML = `
      <div class="tax-boxes">
        <div class="tax-box single">
          <div class="box-label">相続税</div>
          <div class="box-value" style="color:#38a169">0 万円</div>
          <div class="box-sub" style="color:#68d391; margin-top:6px;">基礎控除額以下のため課税なし</div>
        </div>
      </div>
    `;

    document.getElementById('calc-detail').innerHTML = `
      <div class="row"><span>財産総額</span><span>${fmt(netAssets)} 万円</span></div>
      <div class="row"><span>基礎控除額（3,000万＋600万×${totalHeirs}人）</span><span>－ ${fmt(basicDeduction)} 万円</span></div>
      <div class="row strong"><span>課税遺産総額</span><span style="color:#38a169">0 万円</span></div>
    `;
  }

  function renderResult(d) {
    document.getElementById('result-area').style.display = 'block';
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });

    const heirLabel = HEIR_LABEL[d.pattern];

    if (d.hasSpouse) {
      const spouseOnly      = d.heirCount === 0;
      const spouseShareDisp = spouseOnly ? '全部' : spouseFracLabel(d.pattern);
      const otherShareRow   = spouseOnly ? '' : `
        <div class="row"><span>${heirLabel}1人あたりの法定相続分</span><span>${pct(d.eachOtherShare)}</span></div>`;

      const minLabel = spouseOnly
        ? '配偶者の税額軽減あり'
        : '配偶者が全額取得・軽減最大適用';
      const maxLabel = spouseOnly
        ? '配偶者の税額軽減なし'
        : `配偶者以外（${heirLabel}）が全額取得`;

      document.getElementById('result-summary').innerHTML = `
        <div class="tax-boxes">
          <div class="tax-box max">
            <div class="box-label">最高額</div>
            <div class="box-sub">${maxLabel}</div>
            <div class="box-value">${fmt(d.maxTax)} 万円</div>
          </div>
          <div class="tax-box min">
            <div class="box-label">最低額</div>
            <div class="box-sub">${minLabel}</div>
            <div class="box-value">${fmt(d.minTax)} 万円</div>
          </div>
        </div>
      `;

      document.getElementById('calc-detail').innerHTML = `
        <div class="row"><span>財産総額</span><span>${fmt(d.netAssets)} 万円</span></div>
        <div class="row"><span>基礎控除額（3,000万＋600万×${d.totalHeirs}人）</span><span>－ ${fmt(d.basicDeduction)} 万円</span></div>
        <div class="row strong"><span>課税遺産総額</span><span>${fmt(d.taxableAssets)} 万円</span></div>
        <div class="row"><span>配偶者の法定相続分</span><span>${spouseShareDisp}（${pct(d.legalSpouseShare)}）</span></div>
        ${otherShareRow}
        ${d.surcharge > 1 ? `<div class="row" style="color:#c53030; font-size:0.8rem;"><span>※兄弟姉妹の税額に2割加算が適用されます</span></div>` : ''}
      `;

    } else {
      document.getElementById('result-summary').innerHTML = `
        <div class="tax-boxes">
          <div class="tax-box single">
            <div class="box-label">相続税</div>
            <div class="box-value">${fmt(d.totalTax)} 万円</div>
          </div>
        </div>
      `;

      document.getElementById('calc-detail').innerHTML = `
        <div class="row"><span>財産総額</span><span>${fmt(d.netAssets)} 万円</span></div>
        <div class="row"><span>基礎控除額（3,000万＋600万×${d.totalHeirs}人）</span><span>－ ${fmt(d.basicDeduction)} 万円</span></div>
        <div class="row strong"><span>課税遺産総額</span><span>${fmt(d.taxableAssets)} 万円</span></div>
        <div class="row" style="margin-top:8px"><span>${heirLabel}1人あたりの法定相続分</span><span>${pct(d.eachShare)}</span></div>
        ${d.surcharge > 1 ? `<div class="row" style="color:#c53030; font-size:0.8rem;"><span>※兄弟姉妹の税額に2割加算が適用されます</span></div>` : ''}
        <div class="row strong"><span>相続税の合計</span><span>${fmt(d.totalTax)} 万円</span></div>
      `;
    }
  }

  function renderGiftCompare(netAssets) {
    const card = document.getElementById('gift-compare-card');
    const giftAmount = parseFloat(document.getElementById('gift-amount').value) || 0;
    if (!giftAmount || giftAmount <= 0) {
      card.style.display = 'none';
      return;
    }
    card.style.display = 'block';

    const reducedAssets = Math.max(0, netAssets - giftAmount);
    const noGiftInh = computeInheritanceTax(netAssets);
    const giftInh   = computeInheritanceTax(reducedAssets);

    const giftTaxG = calcGiftTax(giftAmount, GIFT_TAX_GENERAL);
    const giftTaxS = calcGiftTax(giftAmount, GIFT_TAX_SPECIAL);

    const genTotalMin = giftInh.min + giftTaxG;
    const genTotalMax = giftInh.max + giftTaxG;
    const speTotalMin = giftInh.min + giftTaxS;
    const speTotalMax = giftInh.max + giftTaxS;

    const diffGen = genTotalMin - noGiftInh.min;
    const diffSpe = speTotalMin - noGiftInh.min;
    const diffGenMax = genTotalMax - noGiftInh.max;
    const diffSpeMax = speTotalMax - noGiftInh.max;

    function diffBadge(diff) {
      if (diff === 0) return '<div class="diff-badge even">差額なし</div>';
      if (diff < 0)   return '<div class="diff-badge saving">▼ ' + fmt(Math.abs(diff)) + ' 万円の節税</div>';
      return           '<div class="diff-badge loss">▲ ' + fmt(diff) + ' 万円の増加</div>';
    }

    function inhDisp(t) {
      return t.min === t.max ? fmt(t.min) + ' 万円' : fmt(t.min) + '～' + fmt(t.max) + ' 万円';
    }

    function totalDisp(tMin, tMax) {
      return tMin === tMax ? fmt(tMin) + ' 万円' : fmt(tMin) + '～' + fmt(tMax) + ' 万円';
    }

    const hasRange = noGiftInh.min !== noGiftInh.max;
    const rangeNote = '';

    document.getElementById('gift-compare-content').innerHTML =
      '<div style="font-size:0.82rem; color:#718096; margin-bottom:14px;">' +
        '贈与額 <strong style="color:#2d3748;">' + fmt(giftAmount) + ' 万円</strong> を財産総額から差し引いた場合の試算です。' +
        rangeNote +
      '</div>' +
      '<div class="gift-table">' +
        '<div class="gt-corner"></div>' +
        '<div class="gt-header no-gift">贈与なし</div>' +
        '<div class="gt-header general">一般税率で贈与<br><span style="font-size:0.68rem; font-weight:400;">（一般の方・兄弟姉妹等）</span></div>' +
        '<div class="gt-header special">特例税率で贈与<br><span style="font-size:0.68rem; font-weight:400;">（子・孫等 18歳以上）</span></div>' +
        '<div class="gt-label">相続税</div>' +
        '<div class="gt-cell no-gift">' + inhDisp(noGiftInh) + '</div>' +
        '<div class="gt-cell general">' + inhDisp(giftInh) + '</div>' +
        '<div class="gt-cell special">' + inhDisp(giftInh) + '</div>' +
        '<div class="gt-label">贈与税</div>' +
        '<div class="gt-cell no-gift">0 万円</div>' +
        '<div class="gt-cell general">' + fmt(giftTaxG) + ' 万円</div>' +
        '<div class="gt-cell special">' + fmt(giftTaxS) + ' 万円</div>' +
        '<div class="gt-label total">合　計</div>' +
        '<div class="gt-cell total no-gift">' + inhDisp(noGiftInh) + '</div>' +
        '<div class="gt-cell total general">' + totalDisp(genTotalMin, genTotalMax) + '</div>' +
        '<div class="gt-cell total special">' + totalDisp(speTotalMin, speTotalMax) + '</div>' +
        (hasRange
          ? ('<div class="gt-label diff" style="flex-direction:column; align-items:flex-start; font-size:0.72rem; line-height:1.6;"><span>差額</span><span>（最低額）</span></div>' +
             '<div class="gt-cell diff no-gift"><div class="diff-badge even">基　準</div></div>' +
             '<div class="gt-cell diff general">' + diffBadge(diffGen) + '</div>' +
             '<div class="gt-cell diff special">' + diffBadge(diffSpe) + '</div>' +
             '<div class="gt-label diff" style="flex-direction:column; align-items:flex-start; font-size:0.72rem; line-height:1.6;"><span>差額</span><span>（最高額）</span></div>' +
             '<div class="gt-cell diff no-gift"><div class="diff-badge even">基　準</div></div>' +
             '<div class="gt-cell diff general">' + diffBadge(diffGenMax) + '</div>' +
             '<div class="gt-cell diff special">' + diffBadge(diffSpeMax) + '</div>')
          : ('<div class="gt-label diff">vs. 贈与なし</div>' +
             '<div class="gt-cell diff no-gift"><div class="diff-badge even">基　準</div></div>' +
             '<div class="gt-cell diff general">' + diffBadge(diffGen) + '</div>' +
             '<div class="gt-cell diff special">' + diffBadge(diffSpe) + '</div>')
        ) +
      '</div>';
    card.scrollIntoView({ behavior: 'smooth' });
  }

  // ---- ユーティリティ ----
  function fmt(n) {
    return Number(Math.round(n)).toLocaleString('ja-JP');
  }

  function pct(r) {
    const p = r * 100;
    if (Math.abs(p - Math.round(p)) < 0.01) return Math.round(p) + '%';
    return p.toFixed(1) + '%';
  }

  function spouseFracLabel(pattern) {
    return { A: '1/2', B: '2/3', C: '3/4' }[pattern];
  }
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js');
    });
  }
</script>
